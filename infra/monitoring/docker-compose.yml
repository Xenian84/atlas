version: "3.9"

networks:
  monitoring:
    driver: bridge

volumes:
  prometheus_data:
  grafana_data:

services:
  # ── Prometheus ──────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: atlas-prometheus
    restart: unless-stopped
    networks: [monitoring]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
      - --web.enable-lifecycle
      - --web.console.libraries=/usr/share/prometheus/console_libraries
      - --web.console.templates=/usr/share/prometheus/consoles

  # ── Grafana ─────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.2
    container_name: atlas-grafana
    restart: unless-stopped
    networks: [monitoring]
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER:     atlas
      GF_SECURITY_ADMIN_PASSWORD: atlasadmin
      GF_USERS_ALLOW_SIGN_UP:     "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_SERVER_ROOT_URL:         "http://localhost:3000/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

  # ── Node Exporter (host metrics: CPU, RAM, disk, network) ──────────────────
  node-exporter:
    image: prom/node-exporter:v1.8.0
    container_name: atlas-node-exporter
    restart: unless-stopped
    networks: [monitoring]
    pid: host
    ports:
      - "9200:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --path.rootfs=/rootfs
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)

  # ── Redis Exporter ──────────────────────────────────────────────────────────
  redis-exporter:
    image: oliver006/redis_exporter:v1.62.0
    container_name: atlas-redis-exporter
    restart: unless-stopped
    networks: [monitoring]
    ports:
      - "9121:9121"
    environment:
      REDIS_ADDR: "redis://host.docker.internal:6379"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ── Postgres Exporter ───────────────────────────────────────────────────────
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: atlas-postgres-exporter
    restart: unless-stopped
    networks: [monitoring]
    ports:
      - "9187:9187"
    environment:
      DATA_SOURCE_NAME: "postgresql://atlas:atlas@host.docker.internal:5432/atlas?sslmode=disable"
    extra_hosts:
      - "host.docker.internal:host-gateway"
