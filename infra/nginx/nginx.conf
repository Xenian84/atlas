worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" rt=$request_time';

    access_log /var/log/nginx/access.log main;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    gzip on;
    gzip_types application/json text/plain text/toon;
    client_max_body_size 1m;

    # Rate limit zones
    limit_req_zone $http_x_api_key zone=api_key:10m rate=10r/s;

    upstream atlas_api {
        server atlas_api:8080;
        keepalive 32;
    }

    upstream explorer {
        server explorer:3000;
        keepalive 16;
    }

    # ── API ───────────────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name api.atlas.example.com;

        location /health {
            proxy_pass http://atlas_api;
        }

        location /metrics {
            # Restrict to internal only
            allow 127.0.0.1;
            deny all;
            proxy_pass http://atlas_api;
        }

        location / {
            limit_req zone=api_key burst=50 nodelay;
            proxy_pass http://atlas_api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 30s;
        }
    }

    # ── Explorer ─────────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name explorer.atlas.example.com;

        location / {
            proxy_pass http://explorer;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }
    }
}
