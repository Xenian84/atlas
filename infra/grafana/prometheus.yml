global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  - job_name: atlas-api
    static_configs:
      - targets: ['localhost:9091']
    metrics_path: /metrics

  - job_name: atlas-indexer
    static_configs:
      - targets: ['localhost:9092']
    metrics_path: /metrics

  - job_name: atlas-intel
    static_configs:
      - targets: ['localhost:9093']
    metrics_path: /metrics

  - job_name: tachyon-validator
    static_configs:
      - targets: ['localhost:8900']
    metrics_path: /metrics
